[build]
  # Build the React frontend; the Netlify function is bundled automatically
  command = "corepack prepare pnpm@10 --activate && pnpm install --frozen-lockfile && pnpm run build:frontend"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # Use root base path on Netlify (no /ai-fashion-shop/ subdirectory)
  VITE_BASE = "/"

[functions]
  node_bundler = "esbuild"
  # These packages are kept as native node_modules inside the function bundle
  external_node_modules = ["postgres", "drizzle-orm"]

# ── API routes → backend Netlify Function ──────────────────────────────────────
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

# ── SPA fallback — send all other routes to index.html ───────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
