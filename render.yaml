services:
  - type: web
    name: styleai-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install -g pnpm@10 && pnpm install --frozen-lockfile && pnpm run build:backend
    startCommand: node dist/index.js
    healthCheckPath: /api/trpc/products.list?batch=1&input=%7B%7D
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ── Set these in the Render dashboard ────────────────────────────────────
      - key: DATABASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_GEMINI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: FRONTEND_URL
        value: https://aya1m22.github.io
